name: Manual SonarCloud Analysis

on:
  workflow_dispatch:
    inputs:
      pr_id:
        description: 'Pull Request ID to analyze'
        required: true
        type: string

jobs:
  sonar-analysis:
    name: SonarCloud Analysis for PR
    runs-on: ubuntu-latest

    steps:
    - name: Get PR details
      id: pr
      uses: actions/github-script@v8
      with:
        script: |
          const pr = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: ${{ inputs.pr_id }}
          });
          core.setOutput('head_ref', pr.data.head.ref);
          core.setOutput('base_ref', pr.data.base.ref);
          core.setOutput('head_sha', pr.data.head.sha);

    - uses: actions/checkout@v6
      with:
        ref: ${{ steps.pr.outputs.head_sha }}
        fetch-depth: 0

    - name: Set up Go 1.26.3
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.3'

    - name: Build
      run: go build -v ./...

    - name: Lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2

    - name: Test
      run: go test -p 1 -v ./... -coverprofile="coverage.out"

    - name: SonarCloud Scan
      uses: sonarsource/sonarqube-scan-action@v8.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      if: env.SONAR_TOKEN != ''
      with:
        args: >
          -Dsonar.pullrequest.key=${{ inputs.pr_id }}
          -Dsonar.pullrequest.branch=${{ steps.pr.outputs.head_ref }}
          -Dsonar.pullrequest.base=${{ steps.pr.outputs.base_ref }}